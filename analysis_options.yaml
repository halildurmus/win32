include: package:lints/dart.yaml

analyzer:
  exclude: [examples/explorer/**, examples/task_manager/**]
  errors:
    todo: ignore

linter:
  rules:
    - avoid_futureor_void
    - omit_obvious_local_variable_types
    - omit_obvious_property_types
    - unintended_html_in_doc_comment
    - unsafe_variance
    - use_truncating_division
