name: Publish

on:
  push:
    tags: ['[A-z0-9]+-v[0-9]+.[0-9]+.[0-9]+*']

jobs:
  get_package_name:
    name: Extract package name
    runs-on: ubuntu-latest
    outputs:
      package_name: ${{ steps.extract.outputs.package_name }}
    steps:
      - name: Extract package name from tag
        id: extract
        run: |
          TAG="${{ github.ref_name }}"
          PACKAGE_NAME="${TAG%-v*}"
          if [[ -z "$PACKAGE_NAME" || "$PACKAGE_NAME" == "$TAG" ]]; then
            echo "ERROR: Could not extract package name from tag: $TAG"
            exit 1
          fi
          echo "package_name=$PACKAGE_NAME" >> "$GITHUB_OUTPUT"

  publish:
    needs: get_package_name
    if: ${{ github.repository_owner == 'halildurmus' }}
    name: Publish to pub.dev
    permissions:
      id-token: write
    uses: dart-lang/setup-dart/.github/workflows/publish.yml@main
    with:
      working-directory: packages/${{ needs.get_package_name.outputs.package_name }}
