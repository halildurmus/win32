name: Prepare Release

on:
  workflow_dispatch:
    inputs:
      package:
        required: true
        description: Package to release
        type: choice
        options:
          - ffi_leak_tracker
          - filepicker_windows
          - win32
          - win32_clipboard
          - win32_gamepad
          - win32_registry
          - win32_runner
          - win32_service
          - winmd

jobs:
  validate:
    if: ${{ github.repository == 'halildurmus/win32' }}
    runs-on: ubuntu-latest

    steps:
      - name: 📚 Git Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: ✅ Validate Package Directory Exists
        run: |
          if [[ ! -d "packages/${{ inputs.package }}" ]]; then
            echo "❌ Directory 'packages/${{ inputs.package }}' does not exist"
            exit 1
          fi
          echo "✅ Directory confirmed: packages/${{ inputs.package }}"

  prepare-release:
    needs: [validate]
    uses: halildurmus/workflows/.github/workflows/prepare_release.yml@b71996adb8995d4af04fe79ebf5173ae51ebcfee
    with:
      working_directory: packages/${{ inputs.package }}
    secrets:
      token: ${{ secrets.PAT }}
